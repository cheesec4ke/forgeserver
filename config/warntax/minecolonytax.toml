	#Actions permitted during Abandoned Colony Claiming raids. See https://ldtteam.github.io/MineColoniesAPI/com/minecolonies/api/colony/permissions/Action.html for a list of possible actions.
	ClaimingActions = ["PLACE_BLOCKS", "BREAK_BLOCKS", "TOSS_ITEM", "PICKUP_ITEM", "ATTACK_CITIZEN", "GUARDS_ATTACK", "FILL_BUCKET", "SHOOT_ARROW", "RIGHTCLICK_BLOCK", "RIGHTCLICK_ENTITY", "ATTACK_ENTITY", "EXPLODE", "HURT_CITIZEN", "HURT_VISITOR", "THROW_POTION", "OPEN_CONTAINER"]
	#Number of Guard Towers required to activate a tax boost for all buildings in a colony.
	#Range: 1 ~ 100
	RequiredGuardTowersForBoost = 5
	#Percentage increase in total tax revenue when required Guard Towers are built. This acts as a multiplier on the colony's total generated tax income. For example: 0.5 = 50% increase, so 1000 tax becomes 1500 tax.
	#Range: 0.0 ~ 2.0
	GuardTowerTaxBoostPercentage = 0.5
	#When enabled and ENABLE_COLONY_TRANSFER is disabled, winning a war will vassalize the losing colony instead of transferring ownership.
	#The losing colony will pay a percentage of their tax income to the winner for a set duration.
	EnableWarVassalization = true
	#Duration (in hours) that a war vassalization lasts.
	#After this time, the vassalization automatically ends. Set to 0 for permanent vassalization until manually revoked.
	#Range: 0 ~ 8760
	WarVassalizationDurationHours = 168
	#Percentage of the vassal colony's tax income paid to the victor as tribute (1-100).
	#This is the tribute rate enforced when a colony is vassalized through war.
	#Range: 1 ~ 100
	WarVassalizationTributePercentage = 25
	#Enable the block interaction filter system during raids and wars.
	#When enabled, this system overrides ALL other protection systems to enforce blacklist/whitelist rules.
	#BLACKLIST blocks CANNOT be interacted with (highest priority - prevents griefing).
	#WHITELIST blocks CAN be interacted with (overrides normal restrictions).
	EnableBlockInteractionFilter = true
	#List of block IDs that CANNOT be interacted with during raids/wars (highest priority).
	#Format:
	#  - Specific block: 'modid:blockname' (e.g., 'minecraft:bedrock', 'minecolonies:blockhuttownhall')
	#  - Entire mod: '#modid' (e.g., '#refinedstorage', '#mekanism')
	#These blocks are completely protected and override any whitelist or permission settings.
	#Default blacklist prevents interaction with critical infrastructure blocks.
	BlockInteractionBlacklist = ["minecraft:bedrock", "minecraft:command_block", "minecraft:chain_command_block", "minecraft:repeating_command_block", "minecraft:structure_block", "minecraft:jigsaw", "minecolonies:blockhuttownhall"]
	#List of block IDs that CAN be interacted with during raids/wars.
	#Format:
	#  - Specific block: 'modid:blockname' (e.g., 'minecraft:chest', 'ironchest:iron_chest')
	#  - Entire mod: '#modid' (e.g., '#ironchest', '#sophisticatedstorage')
	#These blocks can be opened/used even during conflicts.
	#Common use: Allow looting chests and storage blocks.
	#Blacklist always takes priority over whitelist!
	BlockInteractionWhitelist = ["minecraft:chest", "minecraft:barrel", "minecraft:furnace", "minecraft:blast_furnace", "minecraft:smoker", "minecraft:dropper", "minecraft:dispenser", "minecraft:hopper"]
	#Apply block interaction filter during wars.
	#If enabled, blacklist/whitelist rules will be enforced during active wars.
	BlockFilterWars = true
	#Apply block interaction filter during raids.
	#If enabled, blacklist/whitelist rules will be enforced during active raids.
	BlockFilterRaids = true

